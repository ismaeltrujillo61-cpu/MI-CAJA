  <style>
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    html,body{height:100%;background:#0A0C10;color:#F1F5F9;font-family:'Outfit',system-ui,sans-serif;overscroll-behavior:none}
    ::-webkit-scrollbar{width:0}

    @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .summary-card{background:#13161D;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:14px 12px;text-align:center}
    .summary-label{font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:6px}
    .summary-value{font-size:16px;font-weight:800}
    .chip{border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.06);color:#64748B;background:transparent;transition:all 0.15s}
    .chip.active{background:rgba(59,130,246,0.1);border-color:#3B82F6;color:#3B82F6}
    .progress-track{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);margin-top:4px;overflow:hidden}
    .progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#378ADD,#EF9F27);transition:width 0.5s ease}
    .section-title{font-size:13px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .record-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .flow-table-header,.flow-table-row{display:grid;grid-template-columns:50px 1fr 1fr 1fr 1fr;gap:4px;font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .flow-table-header{font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
    input[type="month"],input[type="date"]{background:#13161D;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:10px 14px;color:#F1F5F9;font-size:14px;outline:none;flex:1;color-scheme:dark;font-family:inherit}
    .settings-input{width:100%;background:#0D0F14;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px 14px;color:#F1F5F9;font-size:14px;outline:none;font-family:inherit;margin-bottom:8px}
    .settings-input::placeholder{color:#475569}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:flex-end;justify-content:center}
    .modal-box{background:#13161D;border-radius:24px 24px 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
    .search-input{width:100%;background:#0D0F14;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:12px 16px 12px 42px;color:#F1F5F9;font-size:15px;outline:none;font-family:inherit}
    .search-input::placeholder{color:#475569}
    .search-wrap{position:relative;margin-bottom:16px}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
    .flag-badge{display:inline-block;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#EF4444;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px}
    .note-badge{display:inline-block;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:#F59E0B;font-size:10px;padding:2px 6px;border-radius:8px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;margin-left:4px}

<body>
<div id="app"></div>
<script>
const STORAGE_KEY="miCaja_data_v1";
function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null}catch{return null}}
function saveData(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{}}

const DEFAULT_CATS={
  gasto:[
    {id:"hogar",name:"Gastos del hogar",icon:"🏠",keywords:["hogar","casa","agua","luz","gas","aseo","arriendo","servicios","recibo","predial"]},
    {id:"comida_calle",name:"Comida en la calle",icon:"🍔",keywords:["comida","restaurante","almuerzo","cena","crepes","pizza","hamburguesa","sushi","pollo","comida calle","parmesano","starbucks"]},
    {id:"comida_trabajo",name:"Comida trabajo",icon:"🥪",keywords:["trabajo almuerzo","oficina comida","almuerzo trabajo","comida oficina","corrientazo","comida en la calle trabajo"]},
    {id:"celular",name:"Celular",icon:"📱",keywords:["celular","claro","movistar","tigo","datos","plan","recargar","recarga"]},
    {id:"gimnasio",name:"Gimnasio",icon:"💪",keywords:["gimnasio","gym","bodytech","smart fit","entrenamiento"]},
    {id:"financieros",name:"Gastos financieros",icon:"🏦",keywords:["financiero","comisión","transferencia","interés","intereses","cuota manejo","banco","gastos financieros"]},
    {id:"seguros",name:"Seguros",icon:"🛡️",keywords:["seguro","póliza","sura","bolivar","seguridad"]},
    {id:"ropa",name:"Ropa y zapatos",icon:"👟",keywords:["ropa","zapatos","camisa","pantalón","tenis","chaqueta","vestido","jean"]},
    {id:"rumba",name:"Rumba y trago",icon:"🍻",keywords:["rumba","trago","cerveza","bar","discoteca","fiesta","aguardiente","ron","whisky","licor","rumba y tragoo"]},
    {id:"salud",name:"Salud",icon:"🏥",keywords:["salud","médico","doctor","farmacia","droga","medicina","cita","eps","consulta","dentista"]},
    {id:"viajes",name:"Viajes",icon:"✈️",keywords:["viaje","vuelo","hotel","booking","pasaje","avión","bus","terminal","paseo"]},
    {id:"cuotas",name:"Cuotas financieras",icon:"💳",keywords:["cuota","crédito","tarjeta","préstamo","leasing","financiación","cuota de carro"]},
    {id:"carros",name:"Gasolina y carros",icon:"⛽",keywords:["gasolina","tanquear","carro","moto","taller","mecánico","aceite","llantas","peaje","parqueadero","lavada","soat","tecnicomecánica","repuesto"]},
  ],
  ingreso:[
    {id:"ingreso_9703",name:"Ingreso 9703",icon:"💰",keywords:["9703","ingreso 9703"]},
    {id:"ingreso_4009",name:"Ingreso 4009",icon:"💰",keywords:["4009","ingreso 4009"]},
    {id:"ingreso_arteria",name:"Arteria",icon:"🏢",keywords:["arteria"]},
    {id:"ingreso_oficina",name:"Oficina 3015",icon:"🏢",keywords:["oficina","oficina 3015","3015"]},
    {id:"ingreso_serena",name:"Casa Serena",icon:"🏡",keywords:["serena","casa serena"]},
    {id:"ingreso_lleras",name:"Casa Lleras",icon:"🏡",keywords:["lleras","casa lleras"]},
    {id:"ingreso_sideral",name:"Honorarios Sideral",icon:"⭐",keywords:["sideral","honorarios sideral"]},
    {id:"ingreso_standout",name:"RE Standout",icon:"🏠",keywords:["standout","re standout","honorarios standout"]},
    {id:"ingreso_parquea",name:"Parqueadero WL",icon:"🅿️",keywords:["parqueadero wl","wl"]},
    {id:"ingreso_aguacate",name:"Aguacate Retiro",icon:"🥑",keywords:["aguacate","aguacate retiro","retiro"]},
    {id:"ingreso_general",name:"Ingreso general",icon:"💵",keywords:["ingreso","salario","sueldo","pago","honorario","freelance","transferencia recibida"]},
  ],
};

const state={
  records:[],categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),
  view:"home",input:"",parsed:null,parsing:false,
  selectedMonth:(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`})(),
  newCatName:"",newCatType:"gasto",newCatKeywords:"",
  searchQuery:"",searchFilter:"todo",historyFilter:"todo",pendingFilter:"todo",editingRecord:null,modal:null,
  pendingDate:(()=>new Date().toISOString().slice(0,10))(),
  selectedYear:new Date().getFullYear(),
  privacyMode:true,
};

const saved=loadData();
if(saved){
  if(saved.records)state.records=saved.records;
  if(saved.categories){
    const merged={};
    for(const tipo of["gasto","ingreso"]){
      const savedIds=new Set((saved.categories[tipo]||[]).map(c=>c.id));
      const defaults=(DEFAULT_CATS[tipo]||[]).filter(c=>!savedIds.has(c.id));
      merged[tipo]=[...(saved.categories[tipo]||[]),...defaults];
    }
    state.categories=merged;
  }
}

const MONTHS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function fCOP(v){if(v<0)return `-$${Math.abs(v).toLocaleString("es-CO")}`;return `$${v.toLocaleString("es-CO")}`}
function fShort(v){
  const a=Math.abs(v),s=v<0?"-":"";
  if(a>=1e6){const m=a/1e6;return `${s}$${parseFloat(m.toFixed(3)).toString().replace(".",",")}M`}
  if(a>=1e3){const k=a/1e3;return `${s}$${parseFloat(k.toFixed(1)).toString().replace(".",",")}K`}
  return `${s}$${a.toLocaleString("es-CO")}`;
}
function allCats(){return[...state.categories.gasto,...state.categories.ingreso]}
function catById(id){return allCats().find(c=>c.id===id)}
function catTipo(id){return state.categories.gasto.find(c=>c.id===id)?"gasto":"ingreso"}
function persist(){saveData({records:state.records,categories:state.categories})}
function escHtml(str=""){return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
// Muestra valor o lo tapa según privacyMode
function fPriv(v,fn){return state.privacyMode?`<span style="letter-spacing:3px;opacity:0.35">••••</span>`:(fn||fShort)(v)}

function parseEntry(text){
  const t=text.toLowerCase().trim();
  let bestCat=null,bestScore=0,tipo="gasto";
  for(const t2 of["gasto","ingreso"]){
    for(const cat of state.categories[t2]){
      for(const kw of cat.keywords){
        if(t.includes(kw)){
          const isSpecific=/^[\d\s]+$/.test(kw)||cat.id!=="ingreso_general";
          const score=kw.length+(isSpecific?10:0);
          if(score>bestScore){bestScore=score;bestCat=cat;tipo=t2}
        }
      }
    }
  }
  let textSinCat=t;
  if(bestCat){for(const kw of bestCat.keywords){textSinCat=textSinCat.replace(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),' ')}}
  textSinCat=textSinCat.trim();
  const reNum=/\b(\d+[.,]\d+|\d+)\s*(millones?|millon|m\b|k\b|mil\b)?/g;
  let allMatches=[],match;
  while((match=reNum.exec(textSinCat))!==null){
    const raw=match[1].replace(",",".");
    const num=parseFloat(raw)||0;
    const suf=(match[2]||"").trim();
    let val=0;
    if(suf==="m"||suf==="millon"||suf==="millones")val=Math.round(num*1e6);
    else if(suf==="k"||suf==="mil")val=Math.round(num*1e3);
    else{val=num;if(val>0&&val<10000)val*=1000}
    allMatches.push({val,hasSuffix:suf.length>0});
  }
  let monto=0;
  if(allMatches.length>0){
    const withSuffix=allMatches.filter(m=>m.hasSuffix);
    monto=withSuffix.length>0?Math.max(...withSuffix.map(m=>m.val)):Math.max(...allMatches.map(m=>m.val));
  }
  // Descripción: siempre el texto original del usuario, solo quitando el número principal
  let desc=text.trim().replace(/^\s*[\d]+[.,]?\d*\s*(millones?|millon|m\b|k\b|mil\b)?\s*/i,"").trim();
  if(desc.length<2)desc=text.trim();
  return{monto,categoria:bestCat,tipo,descripcion:desc,confidence:bestScore>0?"high":"low"};
}

async function aiParseEntry(text){
  try{
    const catList=[...state.categories.gasto.map(c=>`GASTO|${c.id}|${c.name}`),...state.categories.ingreso.map(c=>`INGRESO|${c.id}|${c.name}`)].join("\n");
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        messages:[{role:"user",content:`Eres un parser de gastos personales en Colombia (COP). Extrae: monto en pesos (si es menor a 10000 multiplica por 1000), categoría, tipo (gasto/ingreso) y descripción corta.\n\nCategorías:\n${catList}\n\nEntrada: "${text}"\n\nResponde SOLO en JSON sin backticks:\n{"monto":NUMBER,"categoria_id":"ID","tipo":"gasto|ingreso","descripcion":"TEXT"}`}]})});
    const data=await res.json();
    const p=JSON.parse(data.content?.[0]?.text||"");
    const cat=allCats().find(c=>c.id===p.categoria_id);
    // Siempre preservar el texto original del usuario como descripción
    const desc=text.trim().replace(/^\s*[\d]+[.,]?\d*\s*(millones?|millon|m\b|k\b|mil\b)?\s*/i,"").trim()||text.trim();
    return{monto:p.monto,categoria:cat||null,tipo:p.tipo||"gasto",descripcion:desc,confidence:cat?"ai":"low"};
  }catch{return null}
}

async function exportToExcel(){
  if(typeof XLSX==="undefined"){
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
  }
  showToast("Generando Excel...");
  const wb=XLSX.utils.book_new();
  const sorted=[...state.records].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const gastos=sorted.filter(r=>r.tipo==="gasto");
  const ingresos=sorted.filter(r=>r.tipo==="ingreso");

  // ── GASTOS ──
  const gastosData=[["FECHA","EXPLICACION DE GASTO","CONCEPTO CLASIFICABLE","VALOR COP","NOTA","IMPORTANTE"]];
  for(const r of gastos){
    const cat=catById(r.catId);
    gastosData.push([r.date,r.desc||"",cat?cat.name:r.catId,r.monto,r.nota||"",r.flag?"SI":"NO"]);
  }
  const wsG=XLSX.utils.aoa_to_sheet(gastosData);
  wsG["!cols"]=[{wch:12},{wch:45},{wch:25},{wch:14},{wch:25},{wch:12}];
  XLSX.utils.book_append_sheet(wb,wsG,"GASTOS");

  // ── INGRESOS ──
  const ingresosData=[["FECHA","EXPLICACION DE INGRESO","CONCEPTO CLASIFICABLE","VALOR COP","NOTA","IMPORTANTE"]];
  for(const r of ingresos){
    const cat=catById(r.catId);
    ingresosData.push([r.date,r.desc||"",cat?cat.name:r.catId,r.monto,r.nota||"",r.flag?"SI":"NO"]);
  }
  const wsI=XLSX.utils.aoa_to_sheet(ingresosData);
  wsI["!cols"]=[{wch:12},{wch:45},{wch:25},{wch:14},{wch:25},{wch:12}];
  XLSX.utils.book_append_sheet(wb,wsI,"INGRESOS");

  // ── FLUJO DE CAJA ──
  const md=getMonthlyData();
  const allMonths=[...new Set(sorted.map(r=>r.date.slice(0,7)))].sort();
  const gastoCatIds=[...new Set(gastos.map(r=>r.catId))];
  const gastoCats=gastoCatIds.map(id=>catById(id)||{id,name:id}).sort((a,b)=>a.name.localeCompare(b.name));

  const ingByMonth={},egByMonth={};
  for(const m of allMonths){
    ingByMonth[m]=(md[m]||{ingresos:0}).ingresos;
    egByMonth[m]=(md[m]||{gastos:0}).gastos;
  }
  const totalIngAcum=Object.values(ingByMonth).reduce((s,v)=>s+v,0);
  const totalEgAcum=Object.values(egByMonth).reduce((s,v)=>s+v,0);
  const fclAcum=totalIngAcum-totalEgAcum;
  const nMeses=allMonths.length||1;

  const mHead=["CONCEPTO","ACUMULADO","PROM/MES",...allMonths.map(m=>{const[y,mo]=m.split("-");return `${mo}/${y}`})];
  const flujoRows=[mHead,[]];

  // Ingresos
  flujoRows.push(["━━ INGRESOS ━━"]);
  const ingRow=["Total Ingresos",totalIngAcum,Math.round(totalIngAcum/nMeses),...allMonths.map(m=>ingByMonth[m]||0)];
  flujoRows.push(ingRow);
  flujoRows.push([]);

  // Egresos por categoría
  flujoRows.push(["━━ EGRESOS ━━"]);
  for(const cat of gastoCats){
    const byM={};let acum=0;
    for(const r of gastos.filter(r=>r.catId===cat.id)){
      const m=r.date.slice(0,7);byM[m]=(byM[m]||0)+r.monto;acum+=r.monto;
    }
    const nm=Object.values(byM).filter(v=>v>0).length||1;
    flujoRows.push([cat.name,acum,Math.round(acum/nm),...allMonths.map(m=>byM[m]||0)]);
  }
  const egRow=["Total Egresos",totalEgAcum,Math.round(totalEgAcum/nMeses),...allMonths.map(m=>egByMonth[m]||0)];
  flujoRows.push(egRow);
  flujoRows.push([]);

  // FCL
  flujoRows.push(["Flujo de Caja Libre (FCL)",fclAcum,Math.round(fclAcum/nMeses),...allMonths.map(m=>(ingByMonth[m]||0)-(egByMonth[m]||0))]);

  // FCL-H acumulado
  let run=0;
  const fclhRow=["FCL-H (Acumulado histórico)",fclAcum,""];
  for(const m of allMonths){run+=(ingByMonth[m]||0)-(egByMonth[m]||0);fclhRow.push(run)}
  flujoRows.push(fclhRow);

  const wsF=XLSX.utils.aoa_to_sheet(flujoRows);
  wsF["!cols"]=[{wch:30},{wch:16},{wch:14},...allMonths.map(()=>({wch:12}))];
  XLSX.utils.book_append_sheet(wb,wsF,"FLUJO DE CAJA");

  // ── RESUMEN ──
  const resRows=[
    ["RESUMEN FINANCIERO — Mi Caja"],
    ["Generado:",new Date().toLocaleDateString("es-CO")],
    ["Período:",`${allMonths[0]||""} → ${allMonths[allMonths.length-1]||""}`],
    ["Total registros:",state.records.length],
    [],
    ["TOTALES HISTÓRICOS"],
    ["Total Ingresos",totalIngAcum],
    ["Total Gastos",totalEgAcum],
    ["FCL-H",fclAcum],
    ["Promedio mensual libre",Math.round(fclAcum/nMeses)],
    [],
    ["GASTOS POR CATEGORÍA","ACUMULADO","% PARTICIPACIÓN"],
  ];
  for(const cat of gastoCats){
    const total=gastos.filter(r=>r.catId===cat.id).reduce((s,r)=>s+r.monto,0);
    if(total>0)resRows.push([cat.name,total,totalEgAcum>0?parseFloat((total/totalEgAcum*100).toFixed(1)):0]);
  }
  resRows.push(["TOTAL",totalEgAcum,"100%"]);

  const wsR=XLSX.utils.aoa_to_sheet(resRows);
  wsR["!cols"]=[{wch:35},{wch:16},{wch:18}];
  XLSX.utils.book_append_sheet(wb,wsR,"RESUMEN");

  XLSX.writeFile(wb,`MiCaja_Backup_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast("📥 Backup exportado — 4 pestañas");
}

function getMonthlyData(){
  const months={};
  for(const r of state.records){
    const m=r.date.slice(0,7);
    if(!months[m])months[m]={ingresos:0,gastos:0,records:[]};
    if(r.tipo==="ingreso")months[m].ingresos+=r.monto;
    else months[m].gastos+=r.monto;
    months[m].records.push(r);
  }
  return months;
}

function getFlowData(monthlyData){
  const now=new Date();const result=[];let acumulado=0;
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const md=monthlyData[key]||{ingresos:0,gastos:0};
    const libre=md.ingresos-md.gastos;acumulado+=libre;
    result.push({key,label:`${MONTHS[d.getMonth()]} ${String(d.getFullYear()).slice(2)}`,ingresos:md.ingresos,gastos:md.gastos,libre,acumulado});
  }
  return result;
}

function getYearData(year){
  const months=getMonthlyData();
  let totalIngresos=0,totalGastos=0;
  const byMonth=[];
  for(let m=0;m<12;m++){
    const key=`${year}-${String(m+1).padStart(2,"0")}`;
    const md=months[key]||{ingresos:0,gastos:0};
    totalIngresos+=md.ingresos;totalGastos+=md.gastos;
    byMonth.push({label:MONTHS[m],ingresos:md.ingresos,gastos:md.gastos,libre:md.ingresos-md.gastos});
  }
  const n=byMonth.filter(m=>m.ingresos>0||m.gastos>0).length||1;
  return{totalIngresos,totalGastos,flujoTotal:totalIngresos-totalGastos,promedioIngresos:totalIngresos/n,promedioGastos:totalGastos/n,promedioLibre:(totalIngresos-totalGastos)/n,byMonth};
}

function getFCLH(){
  // Flujo de Caja Libre Histórico — acumulado total desde el primer registro
  let totalI=0,totalG=0;
  for(const r of state.records){
    if(r.tipo==="ingreso")totalI+=r.monto;
    else totalG+=r.monto;
  }
  const sorted=[...state.records].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const fechaInicio=sorted.length?sorted[0].date:"";
  const fechaFin=sorted.length?sorted[sorted.length-1].date:"";
  // months covered
  let meses=0;
  if(fechaInicio&&fechaFin){
    const d1=new Date(fechaInicio),d2=new Date(fechaFin);
    meses=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth())+1;
  }
  return{totalI,totalG,fclh:totalI-totalG,fechaInicio,fechaFin,meses,promMensual:meses>0?(totalI-totalG)/meses:0};
}

function renderSearchResults(){
  // Update only the results inside the search modal without destroying the input
  const q=state.searchQuery.toLowerCase().trim();
  const sf=state.searchFilter||"todo";
  function matchRecord(r){
    const cat=catById(r.catId);
    const catName=(cat?.name||r.catId).toLowerCase();
    if(sf==="gasto"&&r.tipo!=="gasto")return false;
    if(sf==="ingreso"&&r.tipo!=="ingreso")return false;
    if(q.length<2)return sf!=="todo";
    let qMonto=0;
    const mMatch=q.match(/^([\d.,]+)\s*(k|m|mil|millon|millones)?$/);
    if(mMatch){qMonto=parseFloat(mMatch[1].replace(",","."))*( mMatch[2]==="k"||mMatch[2]==="mil"?1000:mMatch[2]==="m"||mMatch[2]==="millon"||mMatch[2]==="millones"?1000000:1)}
    if(qMonto>0)return Math.abs(r.monto-qMonto)/qMonto<0.01;
    return r.desc.toLowerCase().includes(q)||catName.includes(q)||(r.nota&&r.nota.toLowerCase().includes(q));
  }
  const results=state.records.filter(matchRecord).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,100);
  const totalMonto=results.reduce((s,r)=>s+(r.tipo==="gasto"?-r.monto:r.monto),0);

  // Update filter buttons highlight
  document.querySelectorAll("[data-sf]").forEach(btn=>{
    const active=btn.dataset.sf===sf;
    const f=btn.dataset.sf;
    btn.style.borderColor=active?(f==="gasto"?"rgba(226,75,74,0.5)":f==="ingreso"?"rgba(55,138,221,0.5)":"rgba(239,159,39,0.5)"):"rgba(255,255,255,0.08)";
    btn.style.background=active?(f==="gasto"?"rgba(226,75,74,0.1)":f==="ingreso"?"rgba(55,138,221,0.1)":"rgba(239,159,39,0.1)"):"transparent";
    btn.style.color=active?(f==="gasto"?"#E24B4A":f==="ingreso"?"#378ADD":"#EF9F27"):"#64748B";
  });

  // Build results HTML
  let html="";
  if(q.length<2&&sf==="todo"){
    html=`<p style="color:#64748B;text-align:center;padding:20px">Escribe para buscar o filtra por tipo</p>`;
  } else if(results.length===0){
    html=`<p style="color:#64748B;text-align:center;padding:20px">Sin resultados</p>`;
  } else {
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.06)"><span style="font-size:11px;color:#64748B">${results.length} resultado${results.length!==1?"s":""}</span><span style="font-size:12px;font-weight:700;color:${totalMonto>=0?"#378ADD":"#E24B4A"}">${totalMonto>=0?"+":""}${fShort(totalMonto)}</span></div>`;
    html+=results.map(r=>{const cat=catById(r.catId);return `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
        <span style="font-size:20px">${cat?.icon||"📌"}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${escHtml(r.desc||cat?.name||"")}${r.flag?`<span class="flag-badge">🚨</span>`:""}${r.nota?`<span class="note-badge">${escHtml(r.nota)}</span>`:""}</div>
          <div style="font-size:11px;color:#64748B">${r.date} · ${escHtml(cat?.name||r.catId)}</div>
        </div>
        <div style="font-size:14px;font-weight:700;color:${r.tipo==="ingreso"?"#378ADD":"#F1F5F9"};white-space:nowrap">${r.tipo==="ingreso"?"+":"-"}${fShort(r.monto)}</div>
      </div>`}).join("");
  }

  const container=document.getElementById("search-results");
  if(container)container.innerHTML=html;
}

function buildHistory(curData){
  const hf=state.historyFilter||"todo";
  // #8: sort by insertion order (id) descending — latest added first
  // Sort by date desc, same date → by id desc (most recently added first)
  const allMonth=[...curData.records].sort((a,b)=>{
    const diff=new Date(b.date)-new Date(a.date);
    if(diff!==0)return diff;
    return b.id>a.id?1:-1;
  });
  const filtered=hf==="todo"?allMonth:allMonth.filter(r=>r.tipo===hf);
  const totI=filtered.filter(r=>r.tipo==="ingreso").reduce((s,r)=>s+r.monto,0);
  const totG=filtered.filter(r=>r.tipo==="gasto").reduce((s,r)=>s+r.monto,0);
  return `
    <div class="view-content fade-in">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <input type="month" id="month-picker" value="${state.selectedMonth}" style="flex:1"/>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:12px">
        ${["todo","gasto","ingreso"].map(f=>`<button data-hf="${f}" style="flex:1;padding:8px;border-radius:10px;border:1px solid ${hf===f?(f==="gasto"?"rgba(226,75,74,0.5)":f==="ingreso"?"rgba(55,138,221,0.5)":"rgba(239,159,39,0.5)"):"rgba(255,255,255,0.08)"};background:${hf===f?(f==="gasto"?"rgba(226,75,74,0.1)":f==="ingreso"?"rgba(55,138,221,0.1)":"rgba(239,159,39,0.1)"):"transparent"};color:${hf===f?(f==="gasto"?"#E24B4A":f==="ingreso"?"#378ADD":"#EF9F27"):"#64748B"};font-size:12px;font-weight:600;cursor:pointer">${f==="todo"?"Todos":f==="gasto"?"💸 Gastos":"💰 Ingresos"}</button>`).join("")}
      </div>
      ${hf!=="todo"?`<div style="display:flex;justify-content:space-between;padding:6px 0;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06)"><span style="font-size:11px;color:#64748B">${filtered.length} registros</span><span style="font-size:12px;font-weight:700;color:${hf==="ingreso"?"#378ADD":"#E24B4A"}">${hf==="ingreso"?"+":"−"}${fShort(hf==="ingreso"?totI:totG)}</span></div>`:""}
      ${filtered.length===0?`<p style="color:#64748B;text-align:center;margin-top:40px">Sin registros para este mes</p>`:""}
      ${filtered.map(r=>{const cat=catById(r.catId);return `
        <div class="record-row">
          <span style="font-size:22px">${cat?.icon||"📌"}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600">${escHtml(r.desc||cat?.name||"")}${r.flag?`<span class="flag-badge">🚨</span>`:""}${r.nota?`<span class="note-badge">${escHtml(r.nota)}</span>`:""}</div>
            <div style="font-size:11px;color:#64748B">${r.date} · ${escHtml(cat?.name||r.catId)}</div>
          </div>
          <div style="font-size:15px;font-weight:700;color:${r.tipo==="ingreso"?"#378ADD":"#F1F5F9"};white-space:nowrap">${r.tipo==="ingreso"?"+":"-"}${fCOP(r.monto)}</div>
          <button data-edit="${r.id}" style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#3B82F6;font-size:12px;border-radius:8px;cursor:pointer;padding:4px 8px">✏️</button>
          <button data-delete="${r.id}" style="background:none;border:none;color:#475569;font-size:16px;cursor:pointer;padding:4px">✕</button>
        </div>`}).join("")}
    </div>`;
}

async function triggerParse(){
  if(!state.input.trim()||state.parsing)return;
  state.parsing=true;render();
  const offline=parseEntry(state.input);
  if(offline.confidence==="high"&&offline.monto>0){state.parsed=offline;state.parsing=false;render()}
  else{
    const ai=await aiParseEntry(state.input);
    state.parsed=(ai&&ai.monto>0&&ai.categoria)?ai:(offline.monto>0?offline:{...offline,monto:0});
    state.parsing=false;render();
  }
}

function confirmEntry(){
  const p=state.parsed;if(!p||p.monto<=0||!p.categoria)return;
  const entry={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),date:state.pendingDate,tipo:p.tipo,catId:p.categoria.id,desc:p.descripcion||state.input,monto:p.monto,raw:state.input,nota:p.nota||"",flag:p.flag||false};
  state.records=[entry,...state.records];
  state.input="";state.parsed=null;
  state.pendingDate=new Date().toISOString().slice(0,10);
  persist();showToast(`${p.tipo==="ingreso"?"+":"-"}${fCOP(p.monto)} registrado`);render();
}

function addCategory(){
  if(!state.newCatName.trim())return;
  const id=state.newCatName.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z_]/g,"");
  const kws=state.newCatKeywords.split(",").map(k=>k.trim().toLowerCase()).filter(Boolean);
  const newCat={id,name:state.newCatName.trim(),icon:"📌",keywords:kws.length?kws:[state.newCatName.toLowerCase()]};
  state.categories[state.newCatType]=[...state.categories[state.newCatType],newCat];
  const name=state.newCatName;state.newCatName="";state.newCatKeywords="";
  persist();showToast(`Categoría "${name}" agregada`);render();
}

function parseExcelDate(val){
  if(!val)return null;
  // JS Date object
  if(val instanceof Date){
    if(isNaN(val.getTime()))return null;
    const y=val.getFullYear(),m=String(val.getMonth()+1).padStart(2,"0"),d=String(val.getDate()).padStart(2,"0");
    if(y<1900||y>2100)return null;
    return `${y}-${m}-${d}`;
  }
  if(typeof val==="string"){
    val=val.trim();
    // yyyy-mm-dd (ISO) — check first
    let m=val.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(m)return `${m[1]}-${m[2]}-${m[3]}`;
    // dd/mm/yyyy or dd-mm-yyyy — Colombian format (ALWAYS treat first as day)
    m=val.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if(m){
      const y=m[3].length===2?"20"+m[3]:m[3];
      let day=parseInt(m[1]),mon=parseInt(m[2]);
      // If month > 12, they are swapped — correct it
      if(mon>12&&day<=12){const tmp=day;day=mon;mon=tmp}
      if(mon<1||mon>12||day<1||day>31)return null;
      return `${y}-${String(mon).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    }
  }
  // Excel serial number — convert using UTC to avoid timezone shifts
  if(typeof val==="number"&&val>1){
    // Excel serial: days since 1899-12-30 (accounting for Excel's leap year bug)
    const days=Math.floor(val);
    // Use UTC date math to avoid timezone issues
    const msPerDay=86400000;
    const epoch=new Date(Date.UTC(1899,11,30)); // 1899-12-30 UTC
    const d=new Date(epoch.getTime()+days*msPerDay);
    if(!isNaN(d.getTime())&&d.getUTCFullYear()>=1990&&d.getUTCFullYear()<=2100){
      return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
    }
  }
  return null;
}

function parseExcelValue(val){
  if(val===null||val===undefined)return 0;
  if(typeof val==="number")return Math.round(Math.abs(val));
  const s=String(val).trim();
  // Handle Excel formulas like =101000+14800+25000 or =D1740
  if(s.startsWith("=")){
    // Simple sum formula: =num1+num2+num3...
    const sumMatch=s.replace(/^=/,"").match(/^[\d+\s]+$/);
    if(sumMatch){
      try{
        const total=s.replace(/^=/,"").split("+").reduce((acc,n)=>acc+parseInt(n.trim()||0),0);
        return Math.round(Math.abs(total));
      }catch{return 0}
    }
    // Formula referencing another cell (=D1740) — we can't resolve, return 0
    return 0;
  }
  // String with text like "pagado con triskel 895000" — extract last number
  const numInText=s.match(/(\d[\d.,]*)\s*$/);
  if(numInText){
    const cleaned=numInText[1].replace(/\./g,"").replace(",",".");
    return Math.round(Math.abs(parseFloat(cleaned)||0));
  }
  // Standard number string
  const cleaned=s.replace(/[$\s]/g,"").replace(/\./g,"").replace(",",".");
  return Math.round(Math.abs(parseFloat(cleaned)||0));
}

function resolveCategory(conceptoRaw,tipoDefault){
  if(!conceptoRaw)return{catId:tipoDefault==="ingreso"?"ingreso_general":"hogar",tipo:tipoDefault};
  const c=String(conceptoRaw).trim().toLowerCase();
  const catId=CONCEPT_MAP[c];
  if(catId){const tipo=state.categories.gasto.find(x=>x.id===catId)?"gasto":"ingreso";return{catId,tipo}}
  for(const t2 of["gasto","ingreso"]){
    for(const cat of state.categories[t2]){
      if(cat.name.toLowerCase()===c||cat.keywords.some(k=>c.includes(k)||k.includes(c)))return{catId:cat.id,tipo:t2};
    }
  }
  return{catId:tipoDefault==="ingreso"?"ingreso_general":"hogar",tipo:tipoDefault};
}

async function importBackupFile(file){
  const statusEl=document.getElementById("import-status");
  if(statusEl)statusEl.textContent="Leyendo backup...";
  try{
    const arrayBuffer=await file.arrayBuffer();
    if(typeof XLSX==="undefined"){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    const wb=XLSX.read(arrayBuffer,{type:"array",cellDates:false,raw:true});
    const sheetNames=wb.SheetNames.map(s=>s.trim().toUpperCase());
    const gastosIdx=sheetNames.findIndex(s=>s==="GASTOS");
    const ingresosIdx=sheetNames.findIndex(s=>s==="INGRESOS");
    if(gastosIdx===-1&&ingresosIdx===-1){
      if(statusEl)statusEl.textContent="❌ No se encontraron pestañas GASTOS ni INGRESOS";
      return;
    }
    let totalImported=0,totalDuplicates=0,totalSkipped=0;
    const existingIds=new Set(state.records.map(r=>r.importId).filter(Boolean));
    const allNewRecords=[];
    const sheetsToProcess=[];
    if(gastosIdx!==-1)sheetsToProcess.push({name:wb.SheetNames[gastosIdx],tipo:"gasto"});
    if(ingresosIdx!==-1)sheetsToProcess.push({name:wb.SheetNames[ingresosIdx],tipo:"ingreso"});
    for(const{name,tipo} of sheetsToProcess){
      if(statusEl)statusEl.textContent=`Procesando ${name}...`;
      const ws=wb.Sheets[name];
      const rawArrays=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
      if(rawArrays.length<2)continue;
      const headerRow=rawArrays[0];
      const rows=rawArrays.slice(1).filter(r=>r&&r.some(c=>c!=null)).map(r=>{
        const obj={};
        headerRow.forEach((h,i)=>{if(h!=null)obj[String(h).trim()]=r[i]??null});
        return obj;
      });
      let imported=0,skipped=0,duplicates=0;
      for(const row of rows){
        const keys=Object.keys(row);
        const fechaKey=keys.find(k=>k.toLowerCase().includes("fecha"));
        const descKey=keys.find(k=>k.toLowerCase().includes("explicacion")||k.toLowerCase().includes("descripcion"));
        const catKey=keys.find(k=>k.toLowerCase().includes("concepto")||k.toLowerCase().includes("categoria"));
        const valKey=keys.find(k=>k.toLowerCase().includes("valor")||k.toLowerCase().includes("monto"));
        const notaKey=keys.find(k=>k.toLowerCase().includes("nota"));
        const flagKey=keys.find(k=>k.toLowerCase().includes("importante"));
        const date=parseExcelDate(fechaKey?row[fechaKey]:null);
        const monto=parseExcelValue(valKey?row[valKey]:0);
        if(!date||monto<=0){skipped++;continue}
        const catRaw=catKey?row[catKey]:"";
        const{catId}=resolveCategory(catRaw,tipo);
        const descRaw=descKey?row[descKey]:"";
        const nota=notaKey?String(row[notaKey]||"").trim():"";
        const flag=flagKey?String(row[flagKey]||"").toUpperCase()==="SI":false;
        const importId=`${date}_${monto}_${String(descRaw).trim().toLowerCase().slice(0,20)}`;
        if(existingIds.has(importId)){duplicates++;continue}
        allNewRecords.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6)+(totalImported+imported),date,tipo,catId,desc:String(descRaw).trim()||catRaw,monto,raw:"",nota,flag,importId});
        imported++;
      }
      totalImported+=imported;totalDuplicates+=duplicates;totalSkipped+=skipped;
    }
    state.records=[...allNewRecords,...state.records].sort((a,b)=>new Date(b.date)-new Date(a.date));
    persist();
    const sheets=sheetsToProcess.map(s=>s.name).join(" + ");
    const msg=`✅ ${totalImported} importados (${sheets})${totalDuplicates>0?" · "+totalDuplicates+" duplicados":""}${totalSkipped>0?" · "+totalSkipped+" inválidos":""}`;
    if(statusEl)statusEl.textContent=msg;
    showToast(`✅ Backup importado — ${totalImported} registros`);
    setTimeout(()=>render(),1500);
  }catch(err){
    console.error(err);
    if(statusEl)statusEl.textContent="❌ Error leyendo el backup.";
  }
}

async function importExcelFile(file,tipoDefault){
  const statusEl=document.getElementById("import-status");
  if(statusEl)statusEl.textContent="Leyendo archivo...";
  try{
    const arrayBuffer=await file.arrayBuffer();
    if(typeof XLSX==="undefined"){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    const wb=XLSX.read(arrayBuffer,{type:"array",cellDates:false,raw:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    // Use header:1 to get raw arrays, then map manually to avoid date format issues
    const rawArrays=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
    if(rawArrays.length<2){if(statusEl)statusEl.textContent="❌ Archivo vacío";return}
    // Find header row (first non-empty row)
    const headerRow=rawArrays[0];
    const rows=rawArrays.slice(1).filter(r=>r&&r.some(c=>c!=null)).map(r=>{
      const obj={};
      headerRow.forEach((h,i)=>{if(h!=null)obj[String(h).trim()]=r[i]??null});
      return obj;
    });
    if(statusEl)statusEl.textContent=`Procesando ${rows.length} filas...`;

    let imported=0,skipped=0,duplicates=0;
    const existingIds=new Set(state.records.map(r=>r.importId).filter(Boolean));
    const newRecords=[];
    for(const row of rows){
      const keys=Object.keys(row);
      const fechaKey=keys.find(k=>k.toLowerCase().includes("fecha"));
      const descKey=keys.find(k=>k.toLowerCase().includes("explicacion")||k.toLowerCase().includes("detalle")||k.toLowerCase().includes("descripcion"));
      const catKey=keys.find(k=>k.toLowerCase().includes("concepto")||k.toLowerCase().includes("categoria"));
      const valKey=keys.find(k=>k.toLowerCase().includes("valor")||k.toLowerCase().includes("monto"));
      const tipoKey=keys.find(k=>k.toLowerCase()==="tipo");
      const date=parseExcelDate(fechaKey?row[fechaKey]:null);
      const monto=parseExcelValue(valKey?row[valKey]:0);
      if(!date||monto<=0){skipped++;continue}
      const tipoRaw=tipoKey?String(row[tipoKey]).toLowerCase().trim():tipoDefault;
      const tipoFinal=tipoRaw.includes("ingreso")?"ingreso":"gasto";
      const catRaw=catKey?row[catKey]:"";
      const{catId,tipo}=resolveCategory(catRaw,tipoFinal);
      const descRaw=descKey?row[descKey]:"";
      // Use a unique ID per record to avoid false duplicate detection
      // Only deduplicate against EXISTING records (already in the app), not within the same file
      const importId=`${date}_${monto}_${String(descRaw).trim().toLowerCase().slice(0,20)}`;
      if(existingIds.has(importId)){duplicates++;continue}
      // Don't add to existingIds within same import — allow duplicates within the file
      newRecords.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6)+(imported++),date,tipo,catId,desc:String(descRaw).trim()||catRaw,monto,raw:"",nota:"",flag:false,importId});
    }
    state.records=[...newRecords,...state.records].sort((a,b)=>new Date(b.date)-new Date(a.date));
    persist();
    const msg=`✅ ${newRecords.length} importados${duplicates>0?" · "+duplicates+" duplicados omitidos":""}${skipped>0?" · "+skipped+" inválidos":""}`;
    if(statusEl)statusEl.textContent=msg;
    showToast(`${newRecords.length} registros importados`);
    setTimeout(()=>render(),1500);
  }catch(err){
    console.error(err);
    if(statusEl)statusEl.textContent="❌ Error leyendo el archivo. Verifica que sea .xlsx";
  }
}

// ── CHARTS ──
let flowChartInstance=null,yearChartInstance=null;

function initFlowChart(flowData){
  const canvas=document.getElementById("flowChartCanvas");
  if(!canvas||typeof Chart==="undefined")return;
  if(flowChartInstance){flowChartInstance.destroy();flowChartInstance=null}
  const acum=[];let sum=0;
  for(const d of flowData){sum+=d.libre;acum.push(sum)}
  const fM=v=>{const a=Math.abs(v),s=v<0?"-":"";if(a>=1e6)return s+"$"+parseFloat((a/1e6).toFixed(2))+"M";return s+"$"+parseFloat((a/1e3).toFixed(0))+"K"};
  flowChartInstance=new Chart(canvas,{
    data:{labels:flowData.map(d=>d.label),datasets:[
      {type:"bar",label:"Ingresos",data:flowData.map(d=>d.ingresos),backgroundColor:"#378ADD99",borderColor:"#378ADD",borderWidth:1,borderRadius:4,order:2},
      {type:"bar",label:"Gastos",data:flowData.map(d=>d.gastos),backgroundColor:"#E24B4A99",borderColor:"#E24B4A",borderWidth:1,borderRadius:4,order:2},
      {type:"line",label:"Acumulado",data:acum,borderColor:"#EF9F27",backgroundColor:"#EF9F2722",borderWidth:2.5,pointBackgroundColor:"#EF9F27",pointRadius:4,tension:0.3,fill:true,order:1,yAxisID:"y2"}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+ctx.dataset.label+": "+fM(ctx.raw)}}},
      scales:{x:{ticks:{autoSkip:false,color:"#64748B",font:{size:11}},grid:{display:false}},y:{position:"left",ticks:{color:"#64748B",font:{size:10},callback:v=>fM(v)},grid:{color:"rgba(255,255,255,0.05)"}},y2:{position:"right",ticks:{color:"#EF9F27",font:{size:10},callback:v=>fM(v)},grid:{display:false}}}
    }
  });
}

function initYearChart(yd){
  const canvas=document.getElementById("yearChartCanvas");
  if(!canvas||typeof Chart==="undefined")return;
  if(yearChartInstance){yearChartInstance.destroy();yearChartInstance=null}
  const fM=v=>{const a=Math.abs(v),s=v<0?"-":"";if(a>=1e6)return s+"$"+parseFloat((a/1e6).toFixed(2))+"M";return s+"$"+parseFloat((a/1e3).toFixed(0))+"K"};
  yearChartInstance=new Chart(canvas,{
    data:{labels:MONTHS,datasets:[
      {type:"bar",label:"Ingresos",data:yd.byMonth.map(m=>m.ingresos),backgroundColor:"#378ADD99",borderColor:"#378ADD",borderWidth:1,borderRadius:3,order:2},
      {type:"bar",label:"Gastos",data:yd.byMonth.map(m=>m.gastos),backgroundColor:"#E24B4A99",borderColor:"#E24B4A",borderWidth:1,borderRadius:3,order:2},
      {type:"line",label:"Utilidad",data:yd.byMonth.map(m=>m.libre),borderColor:"#EF9F27",backgroundColor:"#EF9F2711",borderWidth:2,pointBackgroundColor:"#EF9F27",pointRadius:3,tension:0.3,fill:false,order:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+ctx.dataset.label+": "+fM(ctx.raw)}}},
      scales:{x:{ticks:{autoSkip:false,color:"#64748B",font:{size:10}},grid:{display:false}},y:{ticks:{color:"#64748B",font:{size:10},callback:v=>fM(v)},grid:{color:"rgba(255,255,255,0.05)"}}}
    }
  });
}

render();

if(typeof Chart==="undefined"){
  const s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js";
  s.onload=()=>{
    if(state.view==="flow"){const fd=getFlowData(getMonthlyData());setTimeout(()=>initFlowChart(fd),80)}
    if(state.view==="year"){setTimeout(()=>initYearChart(getYearData(state.selectedYear||new Date().getFullYear())),80)}
  };
  document.head.appendChild(s);
}

if("serviceWorker"in navigator){
  const swCode=`const CACHE="micaja-v3";self.addEventListener("install",e=>{self.skipWaiting()});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim()});self.addEventListener("fetch",e=>{if(e.request.method!=="GET")return;if(e.request.url.includes("anthropic.com"))return;e.respondWith(caches.match(e.request).then(cached=>{const fresh=fetch(e.request).then(res=>{if(res.ok){const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone))}return res}).catch(()=>cached);return cached||fresh}))});`;
  const blob=new Blob([swCode],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
